version: "3.9"

services:
  cd-shiny-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SHINY_PORT: "3838"
      SHINY_HOST: "0.0.0.0"
    ports:
      - "3838:3838"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3838/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
